<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
</head>
<body>
    <h2>All Phones</h2>
    <ul>
        <li th:each="p : ${namesAndPrices}">
            <span th:text="${p[0]}"></span> -
            <span th:text="${p[1]}"></span>
         </li>
    </ul>
	
	<h2>Phones less than 20000</h2>
	    <ul>
	        <li th:each="p : ${cheapPhones}">
	            <span th:text="${p[0]}"></span> -
	            <span th:text="${p[1]}"></span>
	         </li>
	    </ul>
		
		<h2>Count by Type</h2>
		    <ul>
		        <li th:each="t : ${typeCount}">
		            <span th:text="${t[0]}"></span> -
		            <span th:text="${t[1]}"></span>
		         </li>
		    </ul>
</body>
</html>
